name: CI

on:
  - push

permissions: { }

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
        with:
          cache-key-suffix: lint-and-test
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
      - env:
          PYTHONIOENCODING: utf-8 # avoids UnicodeEncodeError in Windows (see https://github.com/Textualize/rich/issues/2411)
        run: uv run --no-sync import-linter lint
      - run: uv run --no-sync pyright
      - run: uv run --no-sync pytest
