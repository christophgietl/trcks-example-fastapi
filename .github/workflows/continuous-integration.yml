name: CI

on:
  - push

permissions: { }

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@d149c21ae8654b9c19faae10433a5674e0094d3b # 2026.5.4
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@d149c21ae8654b9c19faae10433a5674e0094d3b # 2026.5.4
        with:
          cache-key-suffix: lint-and-test
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
      - env:
          PYTHONIOENCODING: utf-8 # avoids UnicodeEncodeError in Windows (see https://github.com/Textualize/rich/issues/2411)
        run: uv run --no-sync import-linter lint
      - run: uv run --no-sync pyright
      - run: uv run --no-sync pytest
