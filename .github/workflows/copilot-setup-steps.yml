name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@1fd6616b6cb3a97aa1f45842c35e32e3a52cb676 # 2026.7.3
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@1fd6616b6cb3a97aa1f45842c35e32e3a52cb676 # 2026.7.3
        with:
          cache-key-suffix: copilot-setup-steps
          install-git-hooks: true
