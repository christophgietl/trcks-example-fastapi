name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv-and-pre-commit-for-copilot@c84085700a4d21a4b7c3ea35704aaa6454ebc72f # 2026.7.13
