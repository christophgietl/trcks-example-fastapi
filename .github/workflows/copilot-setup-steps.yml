name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@d149c21ae8654b9c19faae10433a5674e0094d3b # 2026.5.4
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@d149c21ae8654b9c19faae10433a5674e0094d3b # 2026.5.4
        with:
          cache-key-suffix: copilot-setup-steps
          install-git-hooks: true
