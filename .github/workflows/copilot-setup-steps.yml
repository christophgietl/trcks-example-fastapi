name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
        with:
          cache-key-suffix: copilot-setup-steps
          install-git-hooks: true
