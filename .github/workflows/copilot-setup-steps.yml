name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@7ec182dc025ff02f64f5fe29ca415a48e96fab02 # 2026.4.28
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@7ec182dc025ff02f64f5fe29ca415a48e96fab02 # 2026.4.28
        with:
          cache-key-suffix: copilot-setup-steps
          install-git-hooks: true
