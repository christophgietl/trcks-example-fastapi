version: 2
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/*/
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: daily
  - package-ecosystem: pre-commit
    directory: /
    groups:
      pre-commit:
        patterns:
          - "*"
    schedule:
      interval: daily
  - package-ecosystem: uv
    allow:
      - dependency-type: all
    directory: /
    schedule:
      interval: daily
    versioning-strategy: increase
